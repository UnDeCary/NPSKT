services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: npskt
      POSTGRES_USER: nps
      POSTGRES_PASSWORD: nps
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+psycopg://nps:nps@postgres:5432/npskt
      JWT_SECRET: local-dev-secret
      FRONTEND_ORIGIN: http://localhost:5173
    command: sh -c "pip install -r requirements.txt psycopg[binary] && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    image: node:22
    working_dir: /app/frontend
    volumes:
      - .:/app
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
